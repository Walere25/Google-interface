<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    body{
        text-align: center;
        font-family: Arial, sans-serif;
    }
    h1{
        margin-top:10rem;
        margin-bottom: 1rem;
        font-size: 5rem;
        font-family: Arial, sans-serif;
    }
    .blue{
        color: blue;
    }
    .red{
        color: red;
    }
    .orange{
        color: orange;
    }
    .green{
        color: green;
    }
    .search{
        display: flex;
        border: 1px solid;
        padding: 6px 12px;
        border-radius: 15px;
        width: 70%;
        min-width: 320px;
        margin: auto;
        box-shadow: 0 0 3px;
    }

    input{
        border: none;
        float: left;
        padding: 14px 0px;
        max-width: 80%;
        width: 80%;
        font-size: 16px;
    }
    input:focus{
        border: 0;
        outline: 0;
    }

    
    img{
        border-radius: 100%;
        width: 50px;           
    }
    .search button{
        padding: 4px 10px;
        border-radius: 20px;
        border: white;
    }
   
    .icon button{
        border-radius: 100%;
        border: none;
        width: 60px;
        padding: 20px;
    
    }
    .icon{
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-top: 20px;
    }
</style>
<body>
    <div class="container">
        <h1>
            <span class="blue">G</span><span class="red">o</span><span class="orange">o</span><span class="blue">g</span><span class="green">l</span><span class="red">e</span>
        </h1>
        <div class="search">
            <img src=https://th.bing.com/th?q=Search+Icon+Black+and+White&w=120&h=120&c=1&rs=1&qlt=70&o=7&cb=1&dpr=1.3&pid=InlineBlock&rm=3&mkt=en-WW&cc=NG&setlang=en&adlt=moderate&t=1&mw=247"" class="search__icon" alt="">
            <input type="text" placeholder= "Search Google or type a URL" >
            <img src="https://th.bing.com/th/id/OIP._uNHqcZmcgV_yeQvG0-9bQHaHa?w=192&h=192&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" class="mic" alt="">
            <img src="https://th.bing.com/th?q=Google+Lens+Logo.png&w=120&h=120&c=1&rs=1&qlt=70&o=7&cb=1&dpr=1.3&pid=InlineBlock&rm=3&mkt=en-WW&cc=NG&setlang=en&adlt=moderate&t=1&mw=247" class="lens" alt="">
            <button>AI Mode</button>
        </div>
        <div class="icon">            
            <div>
                <img src="https://th.bing.com/th?q=Google+Logo+White+Background&w=120&h=120&c=1&rs=1&qlt=70&o=7&cb=1&dpr=1.3&pid=InlineBlock&rm=3&mkt=en-WW&cc=NG&setlang=en&adlt=moderate&t=1&mw=247" alt="">
                <p>Gmail</p>
            </div>
            <div>
                <button>+</button>
                <p>Add shortcut</p>
            </div>
        </div>
    </div>
    
</body>
</html>
